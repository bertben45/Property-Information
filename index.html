    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cloudflare.com">

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <!-- TOP HEADER / TABS (From your sketch) -->
    <header class="bg-slate-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center pt-4">
            <div class="text-xl font-bold tracking-wider text-emerald-400 mb-3 sm:mb-0">
                <i class="fa-solid fa-building-user mr-2"></i>GRE DASHBOARD
            </div>
            
            <!-- Main Top Navigation Tabs -->
            <nav class="flex space-x-1">
                <button onclick="switchTab('gre-rental')" id="tab-gre-rental" class="nav-tab px-5 py-2.5 bg-slate-700 text-white font-medium rounded-t-lg border-b-2 border-emerald-400 focus:outline-none transition-all">
                    GRE Rental
                </button>
                <button onclick="switchTab('expenses')" id="tab-expenses" class="nav-tab px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-gray-300 font-medium rounded-t-lg border-b-2 border-transparent focus:outline-none transition-all">
                    Expenses
                </button>
                <button onclick="switchTab('rental-income')" id="tab-rental-income" class="nav-tab px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-gray-300 font-medium rounded-t-lg border-b-2 border-transparent focus:outline-none transition-all">
                    Rental Income
                </button>
            </nav>
        </div>
    </header>

    <!-- MAIN APP WRAPPER -->
    <div class="max-w-7xl w-full mx-auto flex-1 flex flex-col md:flex-row p-4 gap-4">
        
        <!-- LEFT SIDEBAR TABS (BUILT & LOCATION) -->
        <aside class="w-full md:w-64 flex flex-col gap-3">
            <button onclick="switchSubView('built')" id="sub-built" class="sub-tab w-full flex items-center gap-3 px-4 py-3.5 bg-emerald-600 text-white font-semibold rounded-xl shadow-sm hover:bg-emerald-700 transition-all text-left">
                <i class="fa-solid fa-hammer text-lg"></i>
                <div>
                    <span class="block text-sm font-bold uppercase tracking-wider">Built</span>
                    <span class="text-xs font-normal opacity-80">Property Construction & Specs</span>
                </div>
            </button>
            
            <button onclick="switchSubView('location')" id="sub-location" class="sub-tab w-full flex items-center gap-3 px-4 py-3.5 bg-white text-gray-700 font-semibold rounded-xl shadow-sm hover:bg-gray-50 border border-gray-200 transition-all text-left">
                <i class="fa-solid fa-map-location-dot text-emerald-500 text-lg"></i>
                <div>
                    <span class="block text-sm font-bold uppercase tracking-wider text-gray-900">Location</span>
                    <span class="text-xs font-normal text-gray-500">Mapping & Geographic Data</span>
                </div>
            </button>
        </aside>

        <!-- CENTRAL CONTENT MAIN WINDOW -->
        <main class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 p-6 min-h-[450px]">
            <!-- Dynamic Headline showing active route state -->
            <div class="border-b border-gray-100 pb-4 mb-6 flex justify-between items-center">
                <h2 id="content-title" class="text-2xl font-bold text-gray-800">GRE Rental Overview</h2>
                <span id="sub-badge" class="px-3 py-1 bg-emerald-100 text-emerald-800 text-xs font-bold rounded-full uppercase tracking-wide">Built Mode</span>
            </div>

            <!-- CONTENT VIEWS Container -->
            <div id="display-window" class="text-gray-600 space-y-4">
                <!-- Content will dynamically update here via JS -->
                <p>Loading view options...</p>
            </div>
        </main>

        <!-- RIGHT SIDEBAR TAB (ANALISES) -->
        <aside class="w-full md:w-64">
            <button onclick="switchSubView('analyses')" id="sub-analyses" class="w-full flex flex-col items-center justify-center p-6 bg-white text-gray-700 font-semibold rounded-2xl shadow-sm hover:bg-gray-50 border border-gray-200 transition-all gap-2 text-center group">
                <div class="p-3 bg-indigo-50 group-hover:bg-indigo-100 rounded-full transition-colors">
                    <i class="fa-solid fa-chart-pie text-indigo-600 text-2xl"></i>
                </div>
                <span class="block text-base font-bold uppercase tracking-wider text-gray-900">Analises</span>
                <span class="text-xs font-normal text-gray-500">Financial Forecasts & ROI metrics</span>
            </button>
        </aside>

    </div>

    <!-- FOOTER -->
    <footer class="bg-slate-800 text-gray-400 text-center py-4 text-xs border-t border-slate-700 mt-auto">
        &copy; 2026 GRE Rental Portal. Prototyped from User Hand-Sketched Design.
    </footer>
